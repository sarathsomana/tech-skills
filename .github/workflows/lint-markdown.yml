name: Lint Markdown

on:
  pull_request:
    branches: [main]
    paths:
      - "**.md"
      - ".markdownlint.json"
      - ".github/workflows/lint-markdown.yml"

permissions:
  contents: read

jobs:
  lint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            README.md
            CONTRIBUTING.md
            INSTALL.md
            docs/*.md
            skills/*/SKILL.md
            skills/*/README.md
